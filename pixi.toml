[workspace]
name = "robotics-introduction-project"
version = "0.1.0"
channels = ["pytorch", "nvidia", "conda-forge"]
platforms = ["linux-64"]

[activation.env]
ROBOTWIN_ROOT = "../RoboTwin-Project/RoboTwin"
PYTHONPATH = "../RoboTwin-Project/RoboTwin:../RoboTwin-Project/RoboTwin/policy/DP"

[tasks]
python-smoke = "python -c \"import sys; print(sys.version)\""
sapien-import-smoke = "python -c \"import sapien, mplib, torch; print('sapien imports ok')\""
sapien-render-smoke = "python ../RoboTwin-Project/RoboTwin/script/test_render.py"
robotwin-core-import-smoke = "python scripts/env/robotwin_core_import_smoke.py"
dp-import-smoke = "python scripts/env/dp_import_smoke.py"
ffmpeg-video-smoke = "python scripts/env/test_ffmpeg_video_backend.py"
patch-robotwin-vendor = "python ../RoboTwin-Project/scripts/patch_robotwin_vendor.py"
install-curobo = "bash -lc 'cd ../RoboTwin-Project && bash scripts/install_curobo.sh'"
write-env-report = "python scripts/env/write_environment_report.py"
sapien-basic-smoke = "python scripts/sapien/run_basic_tasks.py --tasks six_points --steps-per-segment 4 --width 320 --height 240 --fps 12 --no-keyframes --output-root outputs/sapien_smoke"
sapien-basic-tasks = "python scripts/sapien/run_basic_tasks.py"
sapien-basic-live = "python scripts/sapien/run_basic_tasks.py --live-browser --preview-delay 0.033"
sapien-basic-viewer = "python scripts/sapien/run_basic_tasks.py --sapien-viewer --preview-delay 0.033"
robotwin-dp-smoke-collect = "python scripts/robotwin/run_dp_smoke.py collect"
robotwin-dp-smoke-process = "python scripts/robotwin/run_dp_smoke.py process"
robotwin-dp-smoke-train = "python scripts/robotwin/run_dp_smoke.py train-debug"
robotwin-dp-smoke-eval-start = "python scripts/robotwin/run_dp_smoke.py eval-start"
robotwin-dp-smoke-rollout = "python scripts/robotwin/run_dp_smoke.py single-rollout"
robotwin-dp-smoke-all-light = "python scripts/robotwin/run_dp_smoke.py all-light"

[dependencies]
python = "3.10.*"
pip = ">=24,<26"
numpy = "1.26.*"
setuptools = ">=70,<81"
ninja = "*"
cuda-nvcc = "12.1.*"
cuda-cudart-dev = "12.1.*"
gcc_linux-64 = "12.*"
gxx_linux-64 = "12.*"
ffmpeg = { version = "4.3.*", channel = "conda-forge" }
openh264 = { version = "2.1.1.*", channel = "conda-forge" }
pytorch = "2.4.1.*"
torchvision = "0.19.1.*"
pytorch-cuda = "12.1.*"

[pypi-dependencies]
scipy = "==1.10.1"
h5py = ">=3.10,<4"
imageio = "==2.34.2"
matplotlib = ">=3.8,<4"
pandas = ">=2.2,<3"
seaborn = ">=0.13,<0.14"
tqdm = ">=4.66,<5"
ipython = ">=8.12,<9"
pyyaml = ">=6,<7"
sapien = "==3.0.0b1"
mplib = "==0.2.1"
transforms3d = "==0.4.2"
gymnasium = "==0.29.1"
trimesh = "==4.4.3"
open3d = "==0.18.0"
"opencv-python" = ">=4.9,<5"
"huggingface-hub" = "==0.25.0"
pyglet = "<2"
"dm-control" = "==1.0.9"
mujoco = "==2.3.3"
pyquaternion = "==0.9.9"
einops = "==0.6.0"
toppra = "*"
pydantic = ">=2,<3"
zarr = ">=2.16,<3"
wandb = ">=0.17,<0.20"
moviepy = ">=1.0,<2"
termcolor = ">=2.4,<3"
"hydra-core" = "==1.2.0"
numba = ">=0.59,<0.61"
dill = ">=0.3.8,<0.4"
diffusers = ">=0.27,<0.32"
"warp-lang" = "==1.12.1"
yourdfpy = "==0.0.60"
